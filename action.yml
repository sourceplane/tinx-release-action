name: "kiox-release-action"
description: "Run kiox release with the current build, package, and optional push flags"
author: "sourceplane"
branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  push:
    description: "OCI target reference for --push (for example ghcr.io/sourceplane/torkflow:v0.0.1)"
    required: false
  registry:
    description: "Deprecated alias for 'push'"
    required: false
  manifest:
    description: "Path to the kiox provider manifest"
    required: false
    default: "kiox.yaml"
  output:
    description: "Output OCI image layout directory"
    required: false
    default: "oci"
  dist:
    description: "Build output directory used before packaging"
    required: false
    default: "dist"
  main:
    description: "Go main package to build"
    required: false
  skip-build:
    description: "Enable --skip-build"
    required: false
    default: "false"
  tag:
    description: "OCI tag to write into the layout index"
    required: false
  plain-http:
    description: "Enable --plain-http for registry push flows"
    required: false
    default: "false"
  delegate-goreleaser:
    description: "Enable --delegate-goreleaser"
    required: false
    default: "false"
  goreleaser-config:
    description: "Path to .goreleaser.yml/.yaml when delegation is enabled"
    required: false
  goreleaser-version:
    description: "GoReleaser version to install when delegate-goreleaser is true"
    required: false
    default: "latest"
  goreleaser-install-url:
    description: "GoReleaser installer script URL"
    required: false
    default: "https://goreleaser.com/static/run"
  working-directory:
    description: "Working directory used when running kiox release"
    required: false
    default: "."
  kiox-version:
    description: "kiox version to install"
    required: false
    default: "latest"
  install-url:
    description: "Installer script URL"
    required: false
    default: "https://raw.githubusercontent.com/sourceplane/kiox/main/install.sh"

outputs:
  kiox-version:
    description: "Installed kiox version string"

runs:
  using: "node20"
  main: "dist/index.js"
